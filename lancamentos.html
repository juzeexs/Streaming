<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lançamentos — StreamVault</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
/* ========== PAGE ESPECÍFICO ========== */
.page-wrapper {
  min-height: 100svh;
  padding-top: calc(var(--nav-h) + 32px);
  padding-bottom: 80px;
}

/* ===== HERO DA PÁGINA ===== */
.page-hero {
  padding: 32px var(--section-px) 28px;
  position: relative;
}
.page-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 0%, rgba(220,0,0,0.12) 0%, transparent 65%);
  pointer-events: none;
}
.back-btn {
  display: inline-flex; align-items: center; gap: 7px;
  color: var(--muted); font-size: 13px; font-weight: 500;
  margin-bottom: 20px; transition: color 0.2s;
}
.back-btn:hover { color: #fff; }

.page-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(38px, 6vw, 68px);
  letter-spacing: 2px; line-height: 1;
  margin-bottom: 6px;
}
.page-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 0; }

/* ===== BARRA DE BUSCA GLOBAL ===== */
.global-search-bar {
  padding: 20px var(--section-px) 0;
  position: relative;
}
.global-search-wrap {
  position: relative;
  max-width: 680px;
}
.global-search-icon {
  position: absolute; left: 18px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 16px; pointer-events: none;
  transition: color 0.2s;
}
.global-search-input {
  width: 100%;
  padding: 15px 52px 15px 50px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  color: #fff;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.22s, box-shadow 0.22s;
}
.global-search-input:focus {
  border-color: red;
  box-shadow: 0 0 0 3px rgba(220,0,0,0.12);
}
.global-search-input::placeholder { color: var(--muted); }
.global-search-input:focus + .global-search-icon,
.global-search-wrap:focus-within .global-search-icon { color: red; }

.global-search-clear {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none;
  color: var(--muted); font-size: 12px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.global-search-clear.visible { display: flex; }
.global-search-clear:hover { background: rgba(255,255,255,0.2); color: #fff; }

/* ===== FILTER BAR ===== */
.filter-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 18px var(--section-px);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 12px;
}

.filter-left { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

.result-count { font-size: 13px; color: var(--muted); white-space: nowrap; }
.result-count strong { color: #fff; }

/* Pills de tipo */
.type-pills {
  display: flex; gap: 4px;
  background: var(--surface); border-radius: 10px; padding: 3px;
}
.type-pill {
  padding: 6px 14px; border: none; border-radius: 8px;
  background: transparent; color: var(--muted);
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.type-pill.active { background: var(--surface2); color: #fff; }

/* Categoria pills scroll */
.genre-pills-wrap {
  padding: 0 var(--section-px) 18px;
  overflow-x: auto; scrollbar-width: none;
}
.genre-pills-wrap::-webkit-scrollbar { display: none; }
.genre-pills {
  display: flex; gap: 8px; width: max-content;
}
.genre-pill-btn {
  padding: 7px 16px; border-radius: 980px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}
.genre-pill-btn:hover { border-color: rgba(255,255,255,0.25); color: #fff; }
.genre-pill-btn.active { background: red; border-color: red; color: #fff; }

/* Ordenação */
.sort-select {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 12px;
  color: #fff; font-size: 12px; cursor: pointer; outline: none;
  font-family: 'DM Sans', sans-serif;
}

/* ===== SKELETON LOADING ===== */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, #1e1e1e 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius);
}

/* ===== CATALOG GRID ===== */
.catalog-section { padding: 24px var(--section-px) 60px; }

.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
}
@media (min-width: 480px) {
  .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 16px; }
}
@media (min-width: 768px) {
  .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; }
}
@media (min-width: 1024px) {
  .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 20px; }
}
@media (min-width: 1280px) {
  .catalog-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 22px; }
}

.cat-item {
  cursor: pointer; border-radius: var(--radius);
  overflow: hidden; background: var(--surface);
  transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
  position: relative; border: 1.5px solid transparent;
}
.cat-item:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
  border-color: red;
}
.cat-item-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }

.cat-item-badge {
  position: absolute; top: 9px; left: 9px;
  background: rgba(220,0,0,0.9); backdrop-filter: blur(4px);
  border-radius: 5px; padding: 2px 7px;
  font-size: 9px; font-weight: 700; color: #fff; text-transform: uppercase;
}
.cat-item-score {
  position: absolute; top: 9px; right: 9px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
  border-radius: 5px; padding: 2px 7px;
  font-size: 11px; font-weight: 700; color: var(--gold);
}

.cat-item-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.28s;
  display: flex; flex-direction: column;
  justify-content: flex-end; padding: 14px;
}
.cat-item:hover .cat-item-overlay { opacity: 1; }
.cat-item-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.cat-item-meta { font-size: 11px; color: rgba(255,255,255,0.6); }

.cat-item-info { padding: 10px 11px; }
.cat-item-name {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
}
.cat-item-sub { font-size: 11px; color: var(--muted); }

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 70px 20px; color: var(--muted);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 20px; color: #fff; margin-bottom: 8px; }

/* Load more */
.load-more-wrap { text-align: center; padding: 32px 0 0; }
.btn-load-more {
  padding: 12px 32px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 980px;
  color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
}
.btn-load-more:hover { background: var(--surface2); border-color: rgba(255,255,255,0.2); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.9);
  z-index: 2000; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.28s; backdrop-filter: blur(10px); padding: 12px;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); width: 100%; max-width: 820px;
  border-radius: 20px; overflow: hidden; position: relative;
  border: 1px solid var(--border);
  transform: scale(0.95); transition: transform 0.28s;
  max-height: 92svh; display: flex; flex-direction: column;
}
.modal-overlay.open .modal { transform: scale(1); }
.modal-hero { position: relative; flex-shrink: 0; aspect-ratio: 16/9; overflow: hidden; }
.modal-hero img { width: 100%; height: 100%; object-fit: cover; }
.modal-hero::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.93) 0%, transparent 55%);
}
.modal-hero-info { position: absolute; bottom: 20px; left: 24px; z-index: 1; }
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(24px, 4vw, 40px); letter-spacing: 1px; margin-bottom: 6px;
}
.modal-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.modal-meta span { font-size: 12px; color: rgba(255,255,255,0.7); }
.modal-meta .m-badge {
  background: red; color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
}
.modal-meta .m-star { color: var(--gold); font-weight: 700; font-size: 13px; }

.modal-close {
  position: absolute; top: 12px; right: 12px;
  width: 30px; height: 30px; background: rgba(0,0,0,0.65);
  border: none; border-radius: 50%; color: #fff; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 2; backdrop-filter: blur(6px);
}

.modal-body { padding: 20px 24px; overflow-y: auto; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.modal-actions { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.btn-modal-play {
  display: flex; align-items: center; gap: 7px;
  padding: 11px 22px; background: #fff; color: #000;
  border: none; border-radius: 980px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-modal-play:hover { background: rgba(255,255,255,0.85); }
.btn-modal-list {
  display: flex; align-items: center; gap: 7px;
  padding: 11px 22px; background: rgba(255,255,255,0.13);
  color: #fff; border: 1px solid rgba(255,255,255,0.25);
  border-radius: 980px; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px);
}
.btn-modal-list:hover { background: rgba(255,255,255,0.22); }
.btn-modal-trailer {
  display: flex; align-items: center; gap: 7px;
  padding: 11px 20px; background: red;
  color: #fff; border: none; border-radius: 980px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-modal-trailer:hover { background: #c00; }

.modal-desc { font-size: 14px; color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 16px; }

.modal-info-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
@media (min-width: 480px) { .modal-info-grid { grid-template-columns: repeat(3, 1fr); } }

.modal-info-item label {
  font-size: 10px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; display: block; margin-bottom: 3px;
}
.modal-info-item span { font-size: 13px; color: #fff; font-weight: 500; }

/* Mobile */
@media (max-width: 479px) {
  .modal { border-radius: 14px 14px 0 0; max-height: 96svh; }
  .modal-overlay { align-items: flex-end; padding: 0; }
  .filter-bar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <a href="index.html" class="nav-logo">StreamVault</a>

  <div class="nav-actions">
    <button class="nav-menu-btn" onclick="toggleDrawer()" aria-label="Menu">
      <i class="fa-solid fa-bars" id="menuIcon"></i>
    </button>
    <a href="index.html" class="btn-nav btn-outline">← Início</a>

</nav>

<!-- DRAWER MOBILE -->
<nav class="nav-drawer" id="navDrawer">
  <a href="index.html" onclick="closeDrawer()">Início</a>
  <a href="categoria.html" onclick="closeDrawer()">Categorias</a>
</nav>

<div class="page-wrapper">

  <!-- HERO DA PÁGINA -->
  <div class="page-hero">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
    <h1 class="page-title" id="pageTitle">LANÇAMENTOS</h1>
    <p class="page-subtitle" id="pageSubtitle">Os títulos mais recentes em cartaz e no ar</p>
  </div>

  <!-- BUSCA GLOBAL -->
  <div class="global-search-bar">

      <i class="fa-solid fa-magnifying-glass global-search-icon"></i>
      <input
        type="text"

        class="global-search-input"

      />
      <button class="global-search-clear" id="searchClear" onclick="clearSearch()">

      </button>

  <!-- GENRE PILLS -->
  <div class="genre-pills-wrap" style="padding-top:18px;">
    <div class="genre-pills" id="genrePills">
      <button class="genre-pill-btn active" data-genre="todos" onclick="setGenre('todos',this)">Todos</button>
      <button class="genre-pill-btn" data-genre="28" onclick="setGenre('28',this)">Ação</button>
      <button class="genre-pill-btn" data-genre="18" onclick="setGenre('18',this)">Drama</button>
      <button class="genre-pill-btn" data-genre="35" onclick="setGenre('35',this)">Comédia</button>
      <button class="genre-pill-btn" data-genre="27" onclick="setGenre('27',this)">Terror</button>
      <button class="genre-pill-btn" data-genre="878" onclick="setGenre('878',this)">Sci-Fi</button>
      <button class="genre-pill-btn" data-genre="10749" onclick="setGenre('10749',this)">Romance</button>
      <button class="genre-pill-btn" data-genre="16" onclick="setGenre('16',this)">Animação</button>
      <button class="genre-pill-btn" data-genre="80" onclick="setGenre('80',this)">Crime</button>
      <button class="genre-pill-btn" data-genre="99" onclick="setGenre('99',this)">Documentário</button>
      <button class="genre-pill-btn" data-genre="10765" onclick="setGenre('10765',this)">Fantasia</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">

      <img id="modalImg" src="" alt="">
      <div class="modal-hero-info">

        <div class="modal-info-item"><label>Ano</label><span id="modalYear"></span></div>

        <div class="modal-info-item"><label>Nota</label><span id="modalScore"></span></div>
        <div class="modal-info-item"><label>Idioma</label><span id="modalLang"></span></div>
        <div class="modal-info-item"><label>Gênero</label><span id="modalGenre"></span></div>
        <div class="modal-info-item"><label>Votos</label><span id="modalVotes"></span></div>
      </div>
    </div>
  </div>

<script>
const API_KEY = 'd51fec1a601f0d1c209761a719599c24';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG_URL  = 'https://image.tmdb.org/t/p/w500';
const WIDE_URL = 'https://image.tmdb.org/t/p/original';

const GENRE_NAMES = {
  28:'Ação', 12:'Aventura', 16:'Animação', 35:'Comédia', 80:'Crime',
  99:'Documentário', 18:'Drama', 10751:'Família', 14:'Fantasia',
  27:'Terror', 10762:'Kids', 9648:'Mistério', 10749:'Romance',
  878:'Sci-Fi', 10765:'Fantasia', 53:'Thriller', 10759:'Ação & Aventura',
  10768:'Guerra', 37:'Faroeste'
};

let allItems     = [];
let filteredItems = [];
let displayedCount = 0;
const PAGE_SIZE  = 40;

let currentGenre = 'todos';
let currentType  = 'todos';
let currentSort  = 'popular';
let searchQuery  = '';
let searchTimer  = null;
let isSearchMode = false;

// ============================================================
// INICIALIZAÇÃO — carrega filmes e séries em paralelo
// ============================================================
async function init() {
  renderSkeletons(24);
  try {
    const [mR1, mR2, mR3, mR4, tR1, tR2, tR3] = await Promise.all([
      fetch(`${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=pt-BR&page=1`).then(r=>r.json()),
      fetch(`${BASE_URL}/movie/now_playing?api_key=${API_KEY}&language=pt-BR&page=2`).then(r=>r.json()),
      fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=pt-BR&page=1`).then(r=>r.json()),
      fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=pt-BR&page=2`).then(r=>r.json()),
      fetch(`${BASE_URL}/tv/on_the_air?api_key=${API_KEY}&language=pt-BR&page=1`).then(r=>r.json()),
      fetch(`${BASE_URL}/tv/on_the_air?api_key=${API_KEY}&language=pt-BR&page=2`).then(r=>r.json()),
      fetch(`${BASE_URL}/tv/popular?api_key=${API_KEY}&language=pt-BR&page=1`).then(r=>r.json()),
    ]);

    const movies = [...mR1.results, ...mR2.results, ...mR3.results, ...mR4.results]
      .map(m => formatItem(m, 'filme'));
    const series = [...tR1.results, ...tR2.results, ...tR3.results]
      .map(s => formatItem(s, 'serie'));

    // Deduplicar por id+tipo
    const seen = new Set();
    allItems = [...movies, ...series].filter(i => {
      const k = i.type + i.id;
      if (seen.has(k)) return false;
      seen.add(k); return true;
    });

    applyFilters();
  } catch(e) {
    console.error(e);
    document.getElementById('catalogGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon"></div>
        <h3>Erro ao carregar</h3>
        <p>Verifique sua conexão e recarregue a página</p>
      </div>`;
  }
}

function formatItem(item, type) {
  const genreId = item.genre_ids?.[0];
  return {
    id: item.id,
    title: item.title || item.name || '—',
    type,
    genreIds: item.genre_ids || [],
    genre: GENRE_NAMES[genreId] || 'Outros',
    year: (item.release_date || item.first_air_date || '2024').split('-')[0],
    score: item.vote_average ? parseFloat(item.vote_average.toFixed(1)) : 0,
    desc: item.overview || 'Sinopse não disponível.',
    img: item.poster_path ? IMG_URL + item.poster_path : 'https://placehold.co/200x300/111/444?text=?',
    wide: item.backdrop_path ? WIDE_URL + item.backdrop_path : (item.poster_path ? IMG_URL + item.poster_path : ''),
    lang: (item.original_language || '—').toUpperCase(),
    votes: item.vote_count || 0,
    popularity: item.popularity || 0,
  };
}

// ============================================================
// FILTROS
// ============================================================
function applyFilters() {
  let list = [...allItems];

  // Tipo
  if (currentType !== 'todos') list = list.filter(i => i.type === currentType);

  // Gênero
  if (currentGenre !== 'todos') {
    const gId = parseInt(currentGenre);
    list = list.filter(i => i.genreIds.includes(gId));
  }

  // Busca
  if (searchQuery.trim().length > 0) {
    const q = searchQuery.toLowerCase();
    list = list.filter(i => i.title.toLowerCase().includes(q));
  }

  // Ordenação
  if (currentSort === 'rating')  list.sort((a,b) => b.score - a.score);
  if (currentSort === 'year')    list.sort((a,b) => parseInt(b.year) - parseInt(a.year));
  if (currentSort === 'popular') list.sort((a,b) => b.popularity - a.popularity);

  filteredItems = list;
  displayedCount = 0;
  renderGrid(true);
}

function renderGrid(reset = false) {
  const grid = document.getElementById('catalogGrid');
  document.getElementById('countDisplay').textContent = filteredItems.length;

  if (filteredItems.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon"></div>
        <h3>Nenhum título encontrado</h3>
        <p>Tente outros filtros ou termos de busca</p>
      </div>`;
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }

  const slice = filteredItems.slice(0, displayedCount + PAGE_SIZE);
  displayedCount = slice.length;

  grid.innerHTML = slice.map((item, idx) => `
    <div class="cat-item" onclick="openModal(${idx})">
      <img class="cat-item-poster" src="${item.img}" loading="lazy" alt="${item.title}">
      <span class="cat-item-badge">${item.type === 'filme' ? 'Filme' : 'Série'}</span>
      <span class="cat-item-score"> ${item.score}</span>
      <div class="cat-item-overlay">
        <div class="cat-item-title">${item.title}</div>
        <div class="cat-item-meta">${item.year} · ${item.genre}</div>
      </div>
      <div class="cat-item-info">
        <div class="cat-item-name">${item.title}</div>
        <div class="cat-item-sub">${item.year} · ${item.genre}</div>
      </div>
    </div>`).join('');

  const loadMoreWrap = document.getElementById('loadMoreWrap');
  loadMoreWrap.style.display = displayedCount < filteredItems.length ? 'block' : 'none';
}

function loadMore() {
  renderGrid(false);
}

// ============================================================
// BUSCA GLOBAL (com debounce + API TMDB)
// ============================================================
function handleSearch(value) {
  const clearBtn = document.getElementById('searchClear');
  clearBtn.classList.toggle('visible', value.length > 0);

  clearTimeout(searchTimer);

  if (value.trim().length === 0) {
    searchQuery = '';
    isSearchMode = false;
    updatePageTitle();
    applyFilters();
    return;
  }

  searchTimer = setTimeout(async () => {
    searchQuery = value.trim();

    // Primeiro filtra o que já temos localmente (rápido)
    isSearchMode = true;
    applyFilters();

    // Depois busca na API para pegar títulos que não estão no cache
    try {
      const res = await fetch(
        `${BASE_URL}/search/multi?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(searchQuery)}&page=1`
      );
      const data = await res.json();
      const results = data.results.filter(r => r.media_type !== 'person' && (r.poster_path || r.backdrop_path));

      // Adiciona ao allItems o que não está ainda
      results.forEach(r => {
        const type = r.media_type === 'movie' ? 'filme' : 'serie';
        const exists = allItems.some(i => i.id === r.id && i.type === type);
        if (!exists) allItems.push(formatItem(r, type));
      });

      applyFilters();
    } catch(e) { /* mantém resultado local */ }
  }, 380);
}

function clearSearch() {
  document.getElementById('globalSearch').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  searchQuery = '';
  isSearchMode = false;
  updatePageTitle();
  applyFilters();
}

// ============================================================
// CONTROLES DE FILTRO
// ============================================================
function setGenre(genre, el) {
  currentGenre = genre;
  document.querySelectorAll('.genre-pill-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updatePageTitle();
  applyFilters();
}

function setType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function setSort(val) {
  currentSort = val;
  applyFilters();
}

function updatePageTitle() {
  const titleEl = document.getElementById('pageTitle');
  const subEl   = document.getElementById('pageSubtitle');
  if (isSearchMode && searchQuery) {
    titleEl.textContent = `🔍 RESULTADOS PARA "${searchQuery.toUpperCase()}"`;
    subEl.textContent   = 'Resultados da busca no catálogo completo';
  } else {
    titleEl.textContent = '🆕 LANÇAMENTOS';
    subEl.textContent   = 'Os títulos mais recentes em cartaz e no ar';
  }
}

// ============================================================
// MODAL
// ============================================================
function openModal(idx) {
  const item = filteredItems[idx];
  if (!item) return;

  document.getElementById('modalImg').src = item.wide || item.img;
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalDesc').textContent = item.desc;
  document.getElementById('modalYear').textContent = item.year;
  document.getElementById('modalType').textContent = item.type === 'filme' ? 'Filme' : 'Série';
  document.getElementById('modalScore').textContent = ' ' + item.score;
  document.getElementById('modalLang').textContent = item.lang;
  document.getElementById('modalGenre').textContent = item.genre;
  document.getElementById('modalVotes').textContent = item.votes.toLocaleString('pt-BR');

  document.getElementById('modalMeta').innerHTML = `
    <span class="m-badge">${item.type === 'filme' ? 'Filme' : 'Série'}</span>
    <span>${item.year}</span>
    <span>·</span>
    <span>${item.genre}</span>
    <span>·</span>
    <span class="m-star"> ${item.score}</span>`;

  // Trailer YouTube search link
  const trailerBtn = document.getElementById('modalTrailerBtn');
  trailerBtn.onclick = () => window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(item.title + ' trailer oficial')}`, '_blank');

  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOnOverlay(e) { if (e.target.id === 'modalOverlay') closeModal(); }

// ============================================================
// SKELETON
// ============================================================
function renderSkeletons(n) {
  document.getElementById('catalogGrid').innerHTML = Array(n).fill(`
    <div style="border-radius:14px;overflow:hidden;background:var(--surface);">
      <div class="skeleton" style="aspect-ratio:2/3;"></div>
      <div style="padding:10px 11px;">
        <div class="skeleton" style="height:12px;border-radius:6px;margin-bottom:6px;width:78%;"></div>
        <div class="skeleton" style="height:10px;border-radius:6px;width:45%;"></div>
      </div>
    </div>`).join('');
}

// ============================================================
// NAV DRAWER MOBILE
// ============================================================
function toggleDrawer() {
  const d = document.getElementById('navDrawer');
  const i = document.getElementById('menuIcon');
  const open = d.classList.toggle('open');
  i.className = open ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
}
function closeDrawer() {
  document.getElementById('navDrawer').classList.remove('open');
  document.getElementById('menuIcon').className = 'fa-solid fa-bars';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// Lê parâmetro ?categoria= da URL para pré-filtrar
const urlGenre = new URLSearchParams(location.search).get('categoria');
if (urlGenre) {
  const pillMap = { 'Ação':'28','Drama':'18','Comédia':'35','Terror':'27','Sci-Fi':'878','Animação':'16','Crime':'80' };
  const id = pillMap[urlGenre];
  if (id) {
    currentGenre = id;
    const el = document.querySelector(`.genre-pill-btn[data-genre="${id}"]`);
    if (el) { document.querySelectorAll('.genre-pill-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); }
  }
}

init();
</script>
